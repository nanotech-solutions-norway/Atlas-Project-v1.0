name: Deploy Atlas Control Plane

on:
  push:
    branches:
      - main
    paths:
      - 'control-plane/**'
      - '.github/workflows/deploy-control-plane.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: atlas-control-plane-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload control plane artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: control-plane

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
